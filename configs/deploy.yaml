project:
  name: deploy_dashboard

paths:
  data_root: data
  train_images: data/synthetic/images
  train_masks: data/synthetic/masks
  val_images: data/synthetic_val/images
  val_masks: data/synthetic_val/masks
  test_images: data/novel/images
  test_masks: data/novel/masks
  output_dir: outputs

dataset:
  mask_mode: grayscale
  color_map: null
  label_map: [100, 200, 300, 500, 550, 600, 700, 800, 7100, 10000]
  max_samples: null
  image_exts: [".png", ".jpg", ".jpeg"]
  mask_exts: [".png", ".jpg", ".jpeg"]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  name: deeplabv3plus
  encoder: resnet50
  pretrained: false
  use_timm_backbone: true
  in_channels: 3
  num_classes: 10

train:
  batch_size: 1
  num_workers: 0
  num_epochs: 1
  lr: 0.0001
  weight_decay: 0.0001
  seed: 42
  device: cpu
  image_size: [384, 384]
  lr_scheduler: none
  mixed_precision: false
  grad_accum: 1

loss:
  ce_weight: 1.0
  dice_weight: 1.0
  focal_weight: 0.0
  auto_class_weights: false
  ignore_index: -100

eval:
  ignore_classes: [6]

tta:
  enabled: true
  mode: flip

test:
  log_class_iou: true
  log_class_dist: false
