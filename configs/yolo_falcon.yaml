project:
  name: yolo_falcon_segmentation
paths:
  data_root: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset"
  train_images: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/train/Color_Images"
  train_masks: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/train/Segmentation"
  val_images: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/val/Color_Images"
  val_masks: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/val/Segmentation"
  test_images: "C:/Users/Mohit/Downloads/Offroad_Segmentation_testImages/Offroad_Segmentation_testImages/Color_Images"
  test_masks: "C:/Users/Mohit/Downloads/Offroad_Segmentation_testImages/Offroad_Segmentation_testImages/Segmentation"
  output_dir: outputs

dataset:
  mask_mode: grayscale
  color_map: null
  label_map: [100, 200, 300, 500, 550, 600, 700, 800, 7100, 10000]
  train_profile: light          # light augmentation = faster per-epoch
  max_samples: 200              # cap training samples for fast iteration
  patch_size: [416, 416]        # smaller than 640 = ~2x faster per step
  crop_scale: [0.6, 1.0]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  image_exts: [".png", ".jpg", ".jpeg"]
  mask_exts: [".png", ".jpg", ".jpeg"]

model:
  name: yolo_seg
  yolo_variant: yolov8n-seg     # nano = fastest variant
  pretrained: true
  freeze_backbone: true         # freeze backbone, only train decoder
  num_classes: 10
  in_channels: 3
  dropout: 0.1

train:
  batch_size: 8
  num_workers: 2
  num_epochs: 30
  lr: 0.0003
  weight_decay: 0.0001
  seed: 42
  device: cuda
  image_size: [416, 416]
  lr_scheduler: cosine
  mixed_precision: true
  grad_accum: 1
  log_class_iou: true
  log_class_dist: false         # disable per-epoch dist logging to reduce noise

loss:
  ce_weight: 1.0
  dice_weight: 1.0
  focal_weight: 0.0
  auto_class_weights: true
  class_weighting: median_freq
  max_class_weight: 8.0
  ignore_index: -100

# Classes to exclude from mIoU/mAP50 (index 6 = near-absent class ~0.07% GT pixels)
eval:
  ignore_classes: [6]

consistency:
  enabled: false
  weight: 0.2

hard_mining:
  enabled: true
  top_k: 0.25

tta:
  enabled: false               # disable TTA during fast iteration

test:
  log_class_iou: true
  log_class_dist: true
