project:
  name: offroad_fast_debug
paths:
  data_root: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset"
  train_images: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/val/Color_Images"
  train_masks: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/val/Segmentation"
  val_images: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/val/Color_Images"
  val_masks: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/val/Segmentation"
  test_images: "C:/Users/Mohit/Downloads/Offroad_Segmentation_testImages/Offroad_Segmentation_testImages/Color_Images"
  test_masks: "C:/Users/Mohit/Downloads/Offroad_Segmentation_testImages/Offroad_Segmentation_testImages/Segmentation"
  output_dir: outputs
dataset:
  mask_mode: grayscale
  color_map: null
  label_map: [100, 200, 300, 500, 550, 600, 700, 800, 7100, 10000]
  train_profile: light
  patch_size: [320, 320]
  crop_scale: [0.7, 1.0]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  image_exts: [".png", ".jpg", ".jpeg"]
  mask_exts: [".png", ".jpg", ".jpeg"]
model:
  name: unet
  in_channels: 3
  num_classes: 10
  features: [32, 64, 128, 256]
  residual: false
  dropout: 0.0
train:
  batch_size: 2
  num_workers: 0
  num_epochs: 30
  lr: 0.0002
  weight_decay: 0.0001
  seed: 42
  device: cuda
  image_size: [320, 320]
  lr_scheduler: cosine
  mixed_precision: true
  grad_accum: 2
loss:
  ce_weight: 1.0
  dice_weight: 1.0
  focal_weight: 0.5
  focal_gamma: 2.0
  auto_class_weights: true
  class_weighting: median_freq
  max_class_weight: 8.0
consistency:
  enabled: false
hard_mining:
  enabled: false
tta:
  enabled: true
  mode: flip
