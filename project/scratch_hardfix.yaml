seed: 42

paths:
  train_images: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/train/Color_Images"
  train_masks: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/train/Segmentation"
  val_images: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/val/Color_Images"
  val_masks: "C:/Users/Mohit/Downloads/Offroad_Segmentation_Training_Dataset/val/Segmentation"
  output_dir: "outputs/scratch_hardfix"

data:
  num_classes: 10
  ignore_index: -100
  background_index: 0
  label_map: [100, 200, 300, 500, 550, 600, 700, 800, 7100, 10000]
  image_size: [384, 384]
  object_crop_size: [448, 448]
  object_crop_prob: 0.9
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

sampler:
  strategy: class_aware
  rare_quantile: 0.35
  rare_per_batch: 2
  class_sample_alpha: 1.7
  weighted_alpha: 1.5
  steps_per_epoch: null

model:
  name: unet_scratch
  in_channels: 3
  base_channels: 32
  deep_supervision: true
  aux_weight: 0.4
  pretrained: false

loss:
  ce_weight: 0.5
  dice_weight: 0.3
  focal_weight: 0.2
  focal_gamma: 2.0
  dist_kl_weight: 0.08
  dist_temp: 1.0

train:
  device: cuda
  batch_size: 8
  num_workers: 2
  epochs: 80
  lr: 0.0003
  weight_decay: 0.0005
  amp: true
  grad_clip_norm: 1.0
  log_interval: 20

debug:
  assert_rare_in_every_batch: true
  assert_all_dataset_classes_seen_per_epoch: true
  pred_only_warn_threshold: 0.01

