seed: 42

paths:
  train_images: "../outputs/smoke_data/train/images"
  train_masks: "../outputs/smoke_data/train/masks"
  val_images: "../outputs/smoke_data/val/images"
  val_masks: "../outputs/smoke_data/val/masks"
  output_dir: "../outputs/smoke_hardfix_run"

data:
  num_classes: 10
  ignore_index: -100
  background_index: 0
  label_map: [100, 200, 300, 500, 550, 600, 700, 800, 7100, 10000]
  image_size: [256, 256]
  object_crop_size: [320, 320]
  object_crop_prob: 0.9

sampler:
  strategy: class_aware
  rare_quantile: 0.4
  rare_per_batch: 2
  class_sample_alpha: 1.7
  steps_per_epoch: 3

model:
  name: unet_scratch
  in_channels: 3
  base_channels: 16
  deep_supervision: true
  aux_weight: 0.3
  pretrained: false

loss:
  ce_weight: 0.5
  dice_weight: 0.3
  focal_weight: 0.2
  focal_gamma: 2.0
  dist_kl_weight: 0.08

train:
  device: cuda
  batch_size: 4
  num_workers: 0
  epochs: 1
  lr: 0.0003
  weight_decay: 0.0005
  amp: true
  grad_clip_norm: 1.0
  log_interval: 1

debug:
  assert_rare_in_every_batch: true
  assert_all_dataset_classes_seen_per_epoch: false
  pred_only_warn_threshold: 0.01

