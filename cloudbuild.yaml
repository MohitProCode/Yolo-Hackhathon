substitutions:
  _SERVICE_NAME: desert-vision
  _REGION: us-central1
  _APP_CONFIG: configs/deploy.yaml
  _APP_CHECKPOINT_PATH: models/best.pth
  _APP_CHECKPOINT_URL: ""
  _MEMORY: 4Gi
  _CPU: "2"
  _TIMEOUT: "600"
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "2"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/desert-vision:$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/desert-vision:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image
      - gcr.io/$PROJECT_ID/desert-vision:$SHORT_SHA
      - --region
      - $_REGION
      - --platform
      - managed
      - --no-allow-unauthenticated
      - --memory
      - $_MEMORY
      - --cpu
      - $_CPU
      - --timeout
      - $_TIMEOUT
      - --min-instances
      - $_MIN_INSTANCES
      - --max-instances
      - $_MAX_INSTANCES
      - --set-env-vars
      - APP_CONFIG=$_APP_CONFIG,APP_CHECKPOINT_PATH=$_APP_CHECKPOINT_PATH,APP_CHECKPOINT_URL=$_APP_CHECKPOINT_URL

images:
  - gcr.io/$PROJECT_ID/desert-vision:$SHORT_SHA
